version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      -"3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI: mongodb://mongo:27017/practice
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    ports:
      -"5173:5173"
    depends_on:
      - backend
    volumes:
      -./frontend:/app
  db:
    image: mongo
    ports:
      -"27017:27017"
    volumes:
      -mongo-data:/data/db

volumes:
  mongo-data
  

